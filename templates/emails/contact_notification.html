<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f1f5f9; color: #0f172a; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #ffb800; }
        h2 { color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .field { margin-bottom: 15px; }
        .label { font-weight: bold; color: #64748b; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 16px; margin-top: 5px; padding: 10px; background: #f8fafc; border-radius: 4px; border: 1px solid #e2e8f0; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #94a3b8; }
        .logo { font-size: 24px; font-weight: 900; color: #0f172a; margin-bottom: 20px; text-align: center; letter-spacing: -1px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">GLOCKS AND ARMOR</div>
        <h2>New Contact Request</h2>
        <div class="field">
            <div class="label">Name</div>
            <div class="value">{{ name }}</div>
        </div>
        <div class="field">
            <div class="label">Email Address</div>
            <div class="value">{{ email }}</div>
        </div>
        <div class="field">
            <div class="label">Department</div>
            <div class="value">{{ department }}</div>
        </div>
        <div class="field">
            <div class="label">Message</div>
            <div class="value">{{ message|linebreaks }}</div>
        </div>
        <div class="footer">
            This is an automated notification from Glocks And Armor. Please reply directly to the customer's email address.
        </div>
    </div>
</body>
</html>

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: armor_db
    restart: always
    environment:
      POSTGRES_DB: armor_db
      POSTGRES_USER: armor_user
      POSTGRES_PASSWORD: armor_password_secure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U armor_user -d armor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: armor_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: armor_meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: armor_meili_master_key_secure
      MEILI_ENV: production
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: armor_web
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 armor_project.asgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-enterprise-armor-key-2026-secret
      - DATABASE_URL=postgres://armor_user:armor_password_secure@db:5432/armor_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=armor_meili_master_key_secure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: armor_celery_worker
    restart: always
    command: celery -A armor_project worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-enterprise-armor-key-2026-secret
      - DATABASE_URL=postgres://armor_user:armor_password_secure@db:5432/armor_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - web

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: armor_celery_beat
    restart: always
    command: celery -A armor_project beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-enterprise-armor-key-2026-secret
      - DATABASE_URL=postgres://armor_user:armor_password_secure@db:5432/armor_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - web

  nginx:
    image: nginx:alpine
    container_name: armor_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  meili_data:
  static_volume:
  media_volume:
